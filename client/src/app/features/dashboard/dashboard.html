<div *ngIf="!loading && reading" class="card">
  <div class="card-header">
    <h2>Sequence #{{ reading.sequenceNumber }}</h2>
    <span class="timestamp">{{ reading.timestamp | date:'short' }}</span>
  </div>

  <div class="metrics">
    <div class="metric">
      <label>Temperature</label>
      <span>{{ reading.temperature }} °C</span>
    </div>

    <div class="metric">
      <label>Humidity</label>
      <span>{{ reading.humidity }} %</span>
    </div>

    <div class="metric">
      <label>CO₂</label>
      <span>{{ reading.co2Ppm }} ppm</span>
    </div>
  </div>
</div>
